<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Verification</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background"></div>
    
    <div class="notification" id="notification" style="display: none;">
        <span class="notification-icon">✓</span>
        <span id="notificationText">Successfully verified! You can close this now.</span>
    </div>

    <div class="container">
        <div class="card">
            <div class="avatar-container">
                <img src="avatar.png" alt="User Avatar" class="avatar">
            </div>
            
            <h1 class="title">💙 Zornatalus's Test For Bot Verify</h1>
            <p class="subtitle">Zorna</p>
            
            <button class="verify-btn" id="verifyBtn">Verify</button>
            
            <div class="footer-icon">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z"/>
                </svg>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>Service provided by <a href="https://vaultcord.com" class="link">VaultCord.com</a> | <a href="#privacy" class="link">Privacy Policy</a></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
